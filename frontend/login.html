<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Weather App</title>
    <link rel="icon" href="images/weather-icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="light-theme" id="login-body">
    <header>
        <nav>
            <ul>
                <li class="home-li"><a href="index.html">Home</a></li>
                <div class="theme-change-block">
                    <ul class="theme-list">
                        <div class="theme" id="lightTheme"><span class="light-theme-span"></span></div>
                        <div class="theme" id="darkTheme"><span class="dark-theme-span"></span></div>
                        <div class="theme" id="blackOrangeTheme"><span class="black-orange-theme-span"></span></div>
                    </ul>
                    <li class="theme-li">Theme</li>
                </div>
                <li class="theme-li-2">Theme</li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main class="login-main">
        <div class="login-wrapper">
            <div class="login-box">
                <div class="login-header">
                    <span>Login</span>
                </div>
                <div class="input-box">
                    <input type="text" id="user" class="input-field" required>
                    <label for="user" class="label">Email or Username</label>
                    <svg class="login-icon" xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#434343"><path d="M370.33-524.33Q326.67-568 326.67-634t43.66-109.67Q414-787.33 480-787.33t109.67 43.66Q633.33-700 633.33-634t-43.66 109.67Q546-480.67 480-480.67t-109.67-43.66ZM160-160v-100q0-36.67 18.5-64.17T226.67-366q65.33-30.33 127.66-45.5 62.34-15.17 125.67-15.17t125.33 15.5q62 15.5 127.34 45.17 30.33 14.33 48.83 41.83T800-260v100H160Zm66.67-66.67h506.66V-260q0-14.33-8.16-27-8.17-12.67-20.5-19-60.67-29.67-114.34-41.83Q536.67-360 480-360t-111 12.17Q314.67-335.67 254.67-306q-12.34 6.33-20.17 19-7.83 12.67-7.83 27v33.33Zm315.16-345.5Q566.67-597 566.67-634t-24.84-61.83Q517-720.67 480-720.67t-61.83 24.84Q393.33-671 393.33-634t24.84 61.83Q443-547.33 480-547.33t61.83-24.84ZM480-634Zm0 407.33Z"/></svg>
                </div>
                <div class="input-box">
                    <input type="text" id="pass" class="input-field" required>
                    <label for="pass" class="label">Password</label>
                    <?xml version="1.0"?><svg class="login-icon" id="lock-icon" xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 24 24" width="36px" height="36px">    <path d="M 12 1 C 8.6761905 1 6 3.6761905 6 7 L 6 8 C 4.9069372 8 4 8.9069372 4 10 L 4 20 C 4 21.093063 4.9069372 22 6 22 L 18 22 C 19.093063 22 20 21.093063 20 20 L 20 10 C 20 8.9069372 19.093063 8 18 8 L 18 7 C 18 3.6761905 15.32381 1 12 1 z M 12 3 C 14.27619 3 16 4.7238095 16 7 L 16 8 L 8 8 L 8 7 C 8 4.7238095 9.7238095 3 12 3 z M 6 10 L 18 10 L 18 20 L 6 20 L 6 10 z M 12 13 C 10.9 13 10 13.9 10 15 C 10 16.1 10.9 17 12 17 C 13.1 17 14 16.1 14 15 C 14 13.9 13.1 13 12 13 z"/></svg>
                </div>
                <div class="input-box">
                    <input type="submit" class="input-submit" value="Login">
                </div>
                <div class="register">
                    <span>Don't have an account? <button class="register-button" id="regButton">Register</button></span>
                </div>
            </div>
        </div>
        <div class="custom-selector">
            <span class="light-theme-span" id="currentTheme"></span><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#434343"><path d="M480-360 280-560h400L480-360Z"/></svg>
            <ul>
                <li><span class="light-theme-span"></span></li>
                <li><span class="dark-theme-span"></span></li>
                <li><span class="black-orange-theme-span"></span></li>
            </ul>
        </div>
    </main>
    <footer>
        <p>Copyright - Justik</p>
    </footer>
</body>
</html>
