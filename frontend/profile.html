<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Weather App</title>
    <link rel="icon" href="images/weather-icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li class="home-li">
                    <a class="home-a" href="index.html">
                        <img class="weather-logo" src="images/weather-icon.png">
                        <span class="home-li-span">Home</span>
                    </a>
                </li>
                <div class="theme-change-block">
                    <ul class="theme-list">
                        <div class="theme" id="lightTheme"><span class="light-theme-span"></span></div>
                        <div class="theme" id="darkTheme"><span class="dark-theme-span"></span></div>
                        <div class="theme" id="blackOrangeTheme"><span class="black-orange-theme-span"></span></div>
                    </ul>
                    <li class="theme-li">Theme</li>
                </div>
                <li class="theme-li-2">Theme</li>
                <li class="profile-li"><a href="profile.html">Profile</a></li>
                <!-- <li><a href="">Game</a></li>
                <li><a href="">Store</a></li> -->
                <li class="login-li"><a href="login.html">Login</a></li>
                <li class="profile-img-li">
                    <img class="mini-profile-image" src="images/default-avatar.jpg">
                </li>
            </ul>
        </nav>
        <div class="profile-menu hidden">
            <a href="index.html" class="profile-menu-logo"><img class="mini-weather-logo" src="images/weather-icon.png"> J-Weather</a>
            <button class="logout-button">
                <span>Sign out</span>
                <svg class="logout-icon" xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#434343"><path d="M186.67-120q-27 0-46.84-19.83Q120-159.67 120-186.67v-586.66q0-27 19.83-46.84Q159.67-840 186.67-840h292.66v66.67H186.67v586.66h292.66V-120H186.67Zm470.66-176.67-47-48 102-102H360v-66.66h351l-102-102 47-48 184 184-182.67 182.66Z"/></svg>
            </button>
            <div class="profile-menu-left-side">
                <img class="middle-profile-image" src="images/default-avatar.jpg">
            </div>
            <div class="profile-menu-right-side">
                <h3 class="profile-menu-username">Justik</h3>
                <a class="profile-menu-set-a set-username-a" href='profile.html'>Set Username</a>
                <h4 class="profile-menu-email">default@gmail.com</h4>
                <a class="profile-page-link" href="profile.html">Profile Page</a>
            </div>
        </div>
    </header>
    <main class="profile-main">
        <div class="avatar-container">
            <div class="profile-img-wrapper">
                <img class="profile-img" src="images/FaceCat.jpg">
            </div>
            <input type="file" id="avatarInput" accept="image/jpeg, image/png">
            <label for="avatarInput" class="avatar-btn custom-avatar-uploader">
                <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#434343"><path d="M186.67-186.67H235L680-631l-48.33-48.33-445 444.33v48.33ZM120-120v-142l559.33-558.33q9.34-9 21.5-14 12.17-5 25.5-5 12.67 0 25 5 12.34 5 22 14.33L821-772q10 9.67 14.5 22t4.5 24.67q0 12.66-4.83 25.16-4.84 12.5-14.17 21.84L262-120H120Zm652.67-606-46-46 46 46Zm-117 71-24-24.33L680-631l-24.33-24Z"/></svg>
            </label>
            <button class="avatar-btn custom-avatar-remover">
                <svg xmlns="http://www.w3.org/2000/svg" height="40px" viewBox="0 -960 960 960" width="40px" fill="#434343"><path d="m251.33-204.67-46.66-46.66L433.33-480 204.67-708.67l46.66-46.66L480-526.67l228.67-228.66 46.66 46.66L526.67-480l228.66 228.67-46.66 46.66L480-433.33 251.33-204.67Z"/></svg>
            </button>
        </div>
        <form id="profileForm">
            <input class="profile-username-input" placeholder="Type your username here" type="text">
            <span class="error-message">The username is too long</span>
        </form>
        <button class="save-btn" form="profileForm" type="submit">
            <span class="s-char" data-letter="S">S</span><span class="a-char" data-letter="a">a</span><span class="v-char" data-letter="v">v</span><span class="e-char" data-letter="e">e</span>
        </button>
        <div class="custom-selector">
            <span class="light-theme-span" id="currentTheme"></span><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#434343"><path d="M480-360 280-560h400L480-360Z"/></svg>
            <ul>
                <li><span class="light-theme-span"></span></li>
                <li><span class="dark-theme-span"></span></li>
                <li><span class="black-orange-theme-span"></span></li>
            </ul>
        </div>
    </main>
    <footer>
        <p>Copyright - Justik</p>
    </footer>
</body>
</html>
